server {
    listen 80;
    server_name localhost;

    location / {
        # #region agent log
        add_header X-Debug-Session-Id "a99cbd" always;
        add_header X-Debug-Run-Id "run-2" always;
        add_header X-Debug-Hypothesis-Id "H6_H7_H9" always;
        add_header X-Debug-Config-Marker "frontend-nginx-conf-active" always;
        # #endregion
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # #region agent log
        add_header X-Debug-Session-Id "a99cbd" always;
        add_header X-Debug-Run-Id "run-2" always;
        add_header X-Debug-Hypothesis-Id "H7_H8" always;
        add_header X-Debug-Config-Marker "frontend-api-proxy-active" always;
        # #endregion
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
